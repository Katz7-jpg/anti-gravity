# Ralphy Configuration
# https://github.com/michaelshimeles/ralphy

# Project info (auto-detected, edit if needed)
project:
  name: "ai_factory"
  language: "JavaScript"
  framework: ""
  description: ""

# Model configuration
model:
  engine: "opencode"
  model_name: "modal/glm-5"
  opencode: true
  fast: true

# Commands (auto-detected from package.json/pyproject.toml)
commands:
  test: ""
  lint: ""
  build: ""

# Rules - instructions the AI MUST follow
# These are injected into every prompt
rules:
  - "Always use GLM-5 via Modal for research."
  - "Save extracted leads to a CSV file in a folder named 'leads'."

# Boundaries - files/folders the AI should not modify
boundaries:
  never_touch: []
