# =============================================================================
# SAUDI LINKEDIN BOT - DAILY AUTONOMOUS RUN
# =============================================================================
# This workflow runs the LinkedIn bot on a DAILY schedule.
#
# Configuration: $0 autonomous mode (GitHub Actions only)
# - IP Strategy: accept_risk (US/EU IPs, profile shows Riyadh)
# - Run Frequency: Daily (8 AM UTC ± 90 min randomization)
# - Session: Max 20 minutes
# - Delay: 15-45 seconds (randomized)
# - Likes: Max 3/day
# - Comments: Max 1/3 days
# - Connections: Max 15/run
# - Messages: Max 8/run
# - Timing: Random start 06:30-09:30 UTC (human-like)
#
# DO NOT CHANGE - This is the FINAL optimized configuration
# =============================================================================

name: Saudi LinkedIn Bot - Daily Run

on:
  # Daily schedule - Every day at 8 AM UTC
  schedule:
    - cron: "0 8 * * *"  # Daily at 8 AM UTC
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      run_reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

  # Allow external triggers via repository dispatch
  repository_dispatch:
    types: [linkedin-bot-trigger]

jobs:
  # ===========================================================================
  # PRE-FLIGHT CHECKS
  # ===========================================================================
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      should_continue: ${{ steps.check.outputs.should_continue }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check cooldown status
        id: check
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: |
          # Check if credentials are configured
          if [ -z "$LINKEDIN_EMAIL" ] || [ -z "$LINKEDIN_PASSWORD" ]; then
            echo "should_continue=false" >> $GITHUB_OUTPUT
            echo "reason=Credentials not configured" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check for cooldown file
          COOLDOWN_FILE="${{ github.workspace }}/saudi-linkedin-bot/data/cooldown.txt"
          if [ -f "$COOLDOWN_FILE" ]; then
            COOLDOWN_UNTIL=$(cat "$COOLDOWN_FILE")
            CURRENT_TIME=$(date +%s)
            if [ "$CURRENT_TIME" -lt "$COOLDOWN_UNTIL" ]; then
              REMAINING=$((COOLDOWN_UNTIL - CURRENT_TIME))
              HOURS=$((REMAINING / 3600))
              echo "should_continue=false" >> $GITHUB_OUTPUT
              echo "reason=In cooldown period ($HOURS hours remaining)" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          echo "should_continue=true" >> $GITHUB_OUTPUT
          echo "reason=All checks passed" >> $GITHUB_OUTPUT

  # ===========================================================================
  # LINKEDIN BOT EXECUTION
  # ===========================================================================
  execute-bot:
    name: Execute LinkedIn Bot
    needs: preflight
    if: needs.preflight.outputs.should_continue == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install playwright selenium python-dotenv beautifulsoup4 lxml

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: |
          playwright install chromium

      # Setup environment variables
      - name: Configure environment
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          LINKEDIN_IP_STRATEGY: 'accept_risk'
          LINKEDIN_ACCEPT_TRAVEL_RISK: 'true'
          LINKEDIN_TRAVEL_COOLDOWN: '24'
          LINKEDIN_PROFILE_LOCATION: 'Riyadh'
          LINKEDIN_RUN_FREQUENCY: 'daily'
          LINKEDIN_SESSION_TIMEOUT: '20'
          LINKEDIN_RANDOM_DELAY_MIN: '15'
          LINKEDIN_RANDOM_DELAY_MAX: '45'
          LINKEDIN_MAX_LIKES_PER_DAY: '3'
          LINKEDIN_MAX_COMMENTS_PER_DAY: '1'
          LINKEDIN_COMMENT_DAYS_CYCLE: '3'
          LINKEDIN_MAX_CONNECTIONS_PER_RUN: '15'
          LINKEDIN_MAX_MESSAGES_PER_RUN: '8'
        run: |
          echo "LINKEDIN_IP_STRATEGY=accept_risk" >> $GITHUB_ENV
          echo "LINKEDIN_ACCEPT_TRAVEL_RISK=true" >> $GITHUB_ENV
          echo "LINKEDIN_TRAVEL_COOLDOWN=24" >> $GITHUB_ENV
          echo "LINKEDIN_PROFILE_LOCATION=Riyadh" >> $GITHUB_ENV
          echo "LINKEDIN_RUN_FREQUENCY=daily" >> $GITHUB_ENV
          echo "LINKEDIN_SESSION_TIMEOUT=20" >> $GITHUB_ENV
          echo "LINKEDIN_RANDOM_DELAY_MIN=15" >> $GITHUB_ENV
          echo "LINKEDIN_RANDOM_DELAY_MAX=45" >> $GITHUB_ENV
          echo "LINKEDIN_MAX_LIKES_PER_DAY=3" >> $GITHUB_ENV
          echo "LINKEDIN_MAX_COMMENTS_PER_DAY=1" >> $GITHUB_ENV
          echo "LINKEDIN_COMMENT_DAYS_CYCLE=3" >> $GITHUB_ENV
          echo "LINKEDIN_MAX_CONNECTIONS_PER_RUN=15" >> $GITHUB_ENV
          echo "LINKEDIN_MAX_MESSAGES_PER_RUN=8" >> $GITHUB_ENV

      # ===========================================================================
      # TIMING RANDOMIZATION MODULE
      # ===========================================================================
      # Randomize start time: -90 to +90 minutes from base 08:00 UTC
      # This makes execution appear more human-like
      # ===========================================================================
      - name: Randomize execution timing
        id: timing
        run: |
          # Generate random offset: -90 to +90 minutes
          # RANDOM gives 0-32767, we need -90 to +90
          OFFSET=$((RANDOM % 181 - 90))
          
          echo "Base trigger time: 08:00 UTC"
          echo "Random offset: $OFFSET minutes"
          
          # Calculate actual start time
          if [ $OFFSET -lt 0 ]; then
            ACTUAL_HOURS=$((8 * 60 + OFFSET))
            ACTUAL_HOUR=$((ACTUAL_HOURS / 60))
            ACTUAL_MIN=$((ACTUAL_HOURS % 60))
            printf -v ACTUAL_TIME "%02d:%02d UTC" $ACTUAL_HOUR $ACTUAL_MIN
            echo "Starting $((-OFFSET)) minutes EARLY at $ACTUAL_TIME"
            echo "timing_offset=$OFFSET" >> $GITHUB_OUTPUT
            echo "actual_start_time=$ACTUAL_TIME" >> $GITHUB_OUTPUT
          else
            ACTUAL_HOURS=$((8 * 60 + OFFSET))
            ACTUAL_HOUR=$((ACTUAL_HOURS / 60))
            ACTUAL_MIN=$((ACTUAL_HOURS % 60))
            printf -v ACTUAL_TIME "%02d:%02d UTC" $ACTUAL_HOUR $ACTUAL_MIN
            echo "Waiting $OFFSET minutes, starting at $ACTUAL_TIME"
            sleep $((OFFSET * 60))
            echo "timing_offset=$OFFSET" >> $GITHUB_OUTPUT
            echo "actual_start_time=$ACTUAL_TIME" >> $GITHUB_OUTPUT
          fi
          
          # Log the exact start timestamp for auditing
          echo "EXACT_START_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "Execution timing randomized for human-like behavior"

      # Execute the bot
      - name: Run LinkedIn Bot
        id: bot
        continue-on-error: true
        run: |
          cd saudi-linkedin-bot
          python main.py
          
          # Capture exit code
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      # Handle cooldown on error
      - name: Handle execution result
        if: steps.bot.outputs.exit_code != '0'
        run: |
          # Create cooldown file with 24 hour (1 day) timestamp
          COOLDOWN_UNTIL=$(($(date +%s) + 86400))
          echo "$COOLDOWN_UNTIL" > "${{ github.workspace }}/saudi-linkedin-bot/data/cooldown.txt"
          echo "⚠️ Bot encountered issues - cooldown activated for 1 day"

      # Report results
      - name: Report Results
        run: |
          TIMING_OFFSET="${{ steps.timing.outputs.timing_offset }}"
          ACTUAL_TIME="${{ steps.timing.outputs.actual_start_time }}"
          EXACT_TIMESTAMP="${{ steps.timing.outputs.EXACT_START_TIMESTAMP }}"
          
          if [ "${{ steps.bot.outputs.exit_code }}" == "0" ]; then
            echo "✅ LinkedIn bot executed successfully"
            echo "📅 Scheduled: 08:00 UTC"
            echo "⏰ Actual start: $ACTUAL_TIME (offset: $TIMING_OFFSET minutes)"
            echo "🔢 Timestamp: $EXACT_TIMESTAMP"
            echo "🎯 Target: Riyadh, Saudi Arabia"
          else
            echo "❌ Bot execution failed"
            echo "⏳ Cooldown activated - next attempt in 24 hours"
            echo "📝 Timing offset was: $TIMING_OFFSET minutes"
          fi

  # ===========================================================================
  # SKIPPED RUN NOTIFICATION
  # ===========================================================================
  skipped:
    name: Skipped Run
    needs: preflight
    if: needs.preflight.outputs.should_continue == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Report Skipped Run
        run: |
          echo "⏭️ LinkedIn bot run skipped"
          echo "📝 Reason: ${{ needs.preflight.outputs.reason }}"
          echo "⏳ Next attempt will be checked on next daily trigger"
