name: Ghost Ingest Pipeline

on:
  repository_dispatch:
    types: [process-pdf]
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL to PDF file'
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r ghost_worker/requirements.txt
      
      - name: Process PDF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PDF_URL: ${{ github.event.client_payload.pdf_url || inputs.pdf_url }}
        run: |
          python ghost_worker/process.py
      
      - name: Upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python ghost_worker/sync.py
